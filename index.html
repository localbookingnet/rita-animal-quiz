<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Quiz Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('MVC-09.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            background: darkkhaki;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .title {
            color: #8b4513;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .timer {
            font-size: 4em;
            color: #ff6b6b;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .timer.warning {
            color: #ff0000;
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .animal-image {
            width: 500px;
            height: 350px;
            border: 3px solid #8ABB2A;
            border-radius: 10px;
            margin: 20px 0;
            object-fit: cover;
            background-color: #f0f0f0;
        }
        
        .score {
            font-size: 1.5em;
            margin: 20px 0;
            color: #654321;
        }
        
        .buttons {
            margin: 20px 0;
        }
        
        .btn {
            background: #8b4513;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #654321;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .final-screen {
            display: none;
        }

        .loading-spinner {
            display: none;
            margin: 10px 0;
            color: #8b4513;
        }

        .error-message {
            display: none;
            color: #dc3545;
            margin: 10px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Welcome Screen -->
        <div id="welcome-screen">
            <h1 class="title">🦁 Animal Quiz Game 🦁</h1>
            <h2 class="title">Happy birthday Rita!</h2>
            <div class="instructions">
                <h3>How to Play:</h3>
                <p>• There are 35 animal pictures</p>
                <p>• The clock will go faster and faster</p>
                <p>• Click "RITA!" if you can name the animal</p>
            </div>
            <button class="btn" onclick="startGame()">Start the Quizzzz</button>
            <div class="loading-spinner" id="loading-spinner">🔄 Loading images...</div>
        </div>
        
        <!-- Game Screen -->
        <div id="game-screen" style="display: none;">
            <div class="score">
                Score: <span id="current-score">0</span> / <span id="total-questions">35</span>
            </div>
            
            <div class="timer" id="timer">6</div>
            
            <img id="animal-image" class="animal-image" src="https://via.placeholder.com/300x300/deb887/654321?text=Animal+Picture" alt="Animal">
            <div class="error-message" id="image-error">⚠️ Image failed to load</div>
            
            <div class="buttons">
                <button class="btn btn-success" onclick="playerGotIt()">✅ RITA!</button>
                <button class="btn" onclick="nextAnimal()">⏭️ Next Animal</button>
            </div>
            
            <div id="animal-name" style="font-size: 1.3em; margin-top: 15px; color: #654321;"></div>
        </div>
        
        <!-- Final Screen -->
        <div id="final-screen" class="final-screen">
            <h2>🎉 Game Complete! 🎉</h2>
            <div class="score">
                Final Score: <span id="final-score">0</span> / <span id="final-total">35</span>
            </div>
            <p id="final-message"></p>
            <button class="btn" onclick="restartGame()">🔄 Play Again</button>
        </div>
    </div>

    <script>
        const animals = [
            {
                name: "hartebeest",
                image: "1.jpg"
            },
            {
                name: "zebra", 
                image: "2.jpg"
            },
            {
                name: "chameleon",
                image: "3.jpg"
            },
            {
                name: "grant gazelle",
                image: "4.jpg"
            },
            {
                name: "velvet monkey",
                image: "5.jpg"
            },
            {
                name: "crowned crane",
                image: "6d.jpg"
            },
            {
                name: "warthog",
                image: "7a.jpg"
            },
            {
                name: "dolphin",
                image: "8.jpg"
            },
            {
                name: "sunbird",
                image: "7l.jpg"
            },
            {
                name: "secretary bird",
                image: "8a.jpg"
            },
            {
                name: "leopard",
                image: "8j.jpg"
            },
            {
                name: "thomson gazelle",
                image: "9.jpg"
            },
            {
                name: "vulture",
                image: "9a.jpg"
            },
            {
                name: "buffalo",
                image: "10.jpg"
            },
            {
                name: "kudu",
                image: "10a.jpg"
            },
            {
                name: "superb starling",
                image: "11b.jpg"
            },
            {
                name: "lion",
                image: "12.jpg"
            },
            {
                name: "fox",
                image: "14N.jpg"
            },
            {
                name: "rhino",
                image: "17M.jpg"
            },
            {
                name: "grey headed kingfisher",
                image: "17a.jpg"
            },
            {
                name: "serval cat",
                image: "17.jpg"
            },
            {
                name: "elephant",
                image: "18.jpg"
            },
            {
                name: "wildebeest",
                image: "29.jpg"
            },
            {
                name: "catfish",
                image: "35.jpg"
            },
            {
                name: "bat-eared fox",
                image: "51.jpg"
            },
            {
                name: "polar bear",
                image: "52.jpg"
            },
            {
                name: "caracal",
                image: "55.jpg"
            },
            {
                name: "klipspringer",
                image: "56.jpg"
            },
            {
                name: "giraffe",
                image: "80.jpg"
            },
            {
                name: "terrapin",
                image: "85.jpg"
            },
            {
                name: "hippo",
                image: "86.jpg"
            },
            {
                name: "crocodile",
                image: "92.jpg"
            },
            {
                name: "cheetah",
                image: "97.jpg"
            },
            {
                name: "colobus monkey",
                image: "99.jpg"
            },
            {
                name: "Happy birthday Rita!",
                image: "13.jpg"
            }
        ];
        
        // Game settings 
        const INITIAL_TIMER_SECONDS = 6;  // Starting time
        const MINIMUM_TIMER_SECONDS = 2;  // Fastest time possible
        const TIMER_WARNING = 3;          // When timer turns red
        
        let currentAnimalIndex = 0;
        let score = 0;
        let timeLeft = INITIAL_TIMER_SECONDS;
        let timerInterval = null;
        let gameActive = false;
        let imagesPreloaded = false;
        
        // Preload all images for better performance
        function preloadImages() {
            return new Promise((resolve) => {
                document.getElementById('loading-spinner').style.display = 'block';
                
                let loadedCount = 0;
                const totalImages = animals.length;
                
                animals.forEach(animal => {
                    const img = new Image();
                    img.onload = img.onerror = () => {
                        loadedCount++;
                        if (loadedCount === totalImages) {
                            document.getElementById('loading-spinner').style.display = 'none';
                            imagesPreloaded = true;
                            resolve();
                        }
                    };
                    img.src = animal.image;
                });
            });
        }
        
        // Start the game
        async function startGame() {
            // Preload images if not already done
            if (!imagesPreloaded) {
                await preloadImages();
            }
            
            // Hide welcome screen, show game screen
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            // Reset game variables
            currentAnimalIndex = 0;
            score = 0;
            gameActive = true;
            
            // Update score display
            document.getElementById('total-questions').textContent = animals.length;
            
            // Show first animal
            showCurrentAnimal();
        }
        
        // Show the current animal and start timer
        function showCurrentAnimal() {
            // Check if game is finished
            if (currentAnimalIndex >= animals.length) {
                endGame();
                return;
            }
            
            // Get current animal
            const animal = animals[currentAnimalIndex];
            
            // Setup image with error handling
            const imageElement = document.getElementById('animal-image');
            const errorElement = document.getElementById('image-error');
            
            // Hide error message initially
            errorElement.style.display = 'none';
            
            // Set up error handling
            imageElement.onerror = function() {
                this.src = 'https://via.placeholder.com/300x300/deb887/654321?text=Image+Not+Found';
                errorElement.style.display = 'block';
            };
            
            // Update display
            imageElement.src = animal.image;
            imageElement.alt = animal.name;
            document.getElementById('current-score').textContent = score;
            document.getElementById('animal-name').textContent = ''; // Hide name initially
            
            // Start timer
            startTimer();
        }
        
        // Start the countdown timer
        function startTimer() {
            // Calculate time for this round - gets faster more gradually
            const timeForThisRound = Math.max(
                MINIMUM_TIMER_SECONDS, 
                INITIAL_TIMER_SECONDS - Math.floor(currentAnimalIndex / 4)
            );
            
            timeLeft = timeForThisRound;
            updateTimerDisplay();
            
            // Clear any existing timer
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            // Start new timer
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                // When timer reaches 0, show answer and move to next
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showAnimalName();
                    setTimeout(nextAnimal, 2000); // Wait 2 seconds then move to next
                }
            }, 1000); // Update every second
        }
        
        // Update what the timer shows
        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = timeLeft;
            
            // Make timer red when time is running out
            if (timeLeft <= TIMER_WARNING) {
                timerElement.classList.add('warning');
            } else {
                timerElement.classList.remove('warning');
            }
        }
        
        // Show the animal's name
        function showAnimalName() {
            const animal = animals[currentAnimalIndex];
            document.getElementById('animal-name').textContent = animal.name;
        }
        
        // Player clicked "Rita"
        function playerGotIt() {
            if (!gameActive) return;
            
            // Stop timer
            clearInterval(timerInterval);
            
            // Add to score
            score++;
            
            // Update score display immediately
            document.getElementById('current-score').textContent = score;
            
            // Show animal name
            showAnimalName();
            
            // Move to next animal after short delay
            setTimeout(nextAnimal, 1500);
        }
        
        // Move to next animal
        function nextAnimal() {
            if (!gameActive) return;
            
            currentAnimalIndex++;
            showCurrentAnimal();
        }
        
        // End the game
        function endGame() {
            gameActive = false;
            
            // Stop any running timer
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            // Hide game screen, show final screen
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            
            // Update final score
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-total').textContent = animals.length;
            
            // Show appropriate message based on score
            const percentage = (score / animals.length) * 100;
            let message = '';
            
            if (percentage >= 90) {
                message = '🏆 Outstanding! Animal expert!';
            } else if (percentage >= 80) {
                message = '🎯 Excellent! Well done!';
            } else if (percentage >= 60) {
                message = '👍 Great job!';
            } else if (percentage >= 40) {
                message = '😊 Good effort!';
            } else {
                message = '🌟 Nice try! Play again?';
            }
            
            document.getElementById('final-message').textContent = message;
        }
        
        // Restart the game
        function restartGame() {
            // Hide final screen, show welcome screen
            document.getElementById('final-screen').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'block';
        }
        
        // Preload images when page loads
        window.addEventListener('load', preloadImages);
        
    </script>
</body>
</html>
